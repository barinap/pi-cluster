apiVersion: apps/v1
kind: Deployment
metadata:
  name: kan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kan
  template:
    metadata:
      labels:
        app: kan
    spec:
      initContainers:
        - name: kan-migrate
          # Kan migrate ~v0.5.5 (2026-03-12) - runs Drizzle DB migrations before app starts
          image: ghcr.io/kanbn/kan-migrate@sha256:b8d471291866e3c67d26bd924352f64a03cce805c2673c998ecc4ffa0f08977b
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kan-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql://kan:$(POSTGRES_PASSWORD)@postgres:5432/kan_db"
      containers:
        - name: kan
          # Kan ~v0.5.5 (2026-03-12) - pinned to digest to prevent breaking changes on restart
          image: ghcr.io/kanbn/kan@sha256:bd0af200c962271db5fe22b5f508154ea5491cb947a0309d88458a16dc62772a
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_BASE_URL
              value: "https://tasks.barina.tech"
            - name: NEXT_PUBLIC_ALLOW_CREDENTIALS
              value: "true"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kan-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql://kan:$(POSTGRES_PASSWORD)@postgres:5432/kan_db"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: kan-secret
                  key: BETTER_AUTH_SECRET
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kan-s3-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kan-s3-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_ENDPOINT
              value: "https://tasks-storage.barina.tech"
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: NEXT_PUBLIC_STORAGE_URL
              value: "https://tasks-storage.barina.tech"
            - name: NEXT_PUBLIC_STORAGE_DOMAIN
              value: "tasks-storage.barina.tech"
            - name: NEXT_PUBLIC_USE_VIRTUAL_HOSTED_URLS
              value: "false"
            - name: NEXT_PUBLIC_AVATAR_BUCKET_NAME
              value: "kan-avatars"
            - name: NEXT_PUBLIC_ATTACHMENTS_BUCKET_NAME
              value: "kan-attachments"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
